# 工作流名称，在 GitHub Actions 界面中显示
name: CI

# 触发条件：何时运行此流水线
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: go build -o server .

      # 登录 Docker Hub（需在仓库 Settings → Secrets 配置 DOCKERHUB_USERNAME 和 DOCKERHUB_TOKEN）
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送到 Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ github.sha }}

  # 部署到本机：在 Mac 上拉取镜像并运行（需先配置自托管 Runner）
  deploy-local:
    needs: build
    runs-on: self-hosted  # 使用本机 Runner，见下方配置说明
    steps:
      - name: 拉取最新镜像并运行
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:latest
          docker stop exam-app 2>/dev/null || true
          docker rm exam-app 2>/dev/null || true
          docker run -d --name exam-app -p 8080:8080 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:latest
