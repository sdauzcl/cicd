# 工作流名称，在 GitHub Actions 界面中显示
name: CI

# 触发条件：何时运行此流水线
on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: go build -o server .

      # 支持多架构构建（AMD64 + ARM64，Mac M 系列可原生运行）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送到 Docker Hub（多架构）
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:${{ github.sha }}

  # 部署到本机：在 Mac 上拉取镜像并运行（需先配置自托管 Runner）
  # 配置好 Runner 后，将 if: false 改为 if: true
  deploy-local:
    needs: build
    if: true  # 暂无 Runner 时设为 false，配置好 Runner 后改为 true
    runs-on: self-hosted
    steps:
      - name: 拉取最新镜像并运行
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:latest
          docker stop exam-app 2>/dev/null || true
          docker rm exam-app 2>/dev/null || true
          docker run -d --name exam-app -p 8080:8080 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:latest
